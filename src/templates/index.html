<!DOCTYPE html>

<html>
<head>
  <title>IoT Dashboard</title>

  <style>
    :root {
      --background-color: rgb(24, 23, 23);
      --container-color: rgb(34, 33, 33);
      --secondary-container-color: rgb(41, 38, 38);
      --text-color: rgb(211, 197, 197);

      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--background-color);
      color: var(--text-color);
    }

    h1 {
      font-size: 42px;
      font-weight: 400;
    }

    .flex-container {
      width: 95%;
      padding: 2.5%;
      justify-self: center;
      display: flex;
      flex-direction: row;
      gap: 20px;
      align-items: flex-start;
    }

    #temperature-graph {
      justify-self: center;
      max-width: 80%;
    }

    .content-container {
      background-color: var(--container-color);
      border-radius: 20px;
      padding: 1.5%;
    }

    h1 {
      justify-self: center;
    }

    h2 {
      margin-top: 5px;
    }

    button.active {
      background-color: blue;
    }

    button {
      background: var(--container-color);
      color: var(--text-color);
      border-radius: 6px;
      font-size: 14px;
      padding: 3px 10px;
    }

    .secondary-container {
      padding: 2%;
      margin: 2%;
      background-color: var(--secondary-container-color);
      border-radius: 10px;
    }

    #custom-pattern {
      display: none;
    }

    #temp-leds > * {
      margin: 0 0 10px 0;
    }

    #edit-temp-leds {
      display: none;
      flex-direction: column;
      margin-top: 10px;
      background-color: var(--secondary-container-color);
    }

    #edit-temp-leds > * {
      margin: 0 0 10px 0;
    }

    #edit-temp-leds > * > label {
      float: left;
      min-width: 80px;
    }

    #edit-temp-leds > * > input {
      float: left;
      width: 100px;
    }

    #edit-temp-leds > button {
      width: fit-content;
      margin: 0;
    }

    .control-buttons {
      justify-self: center;
      display: flex;
      gap: 10px;
    }

    .led-checkboxes {
      justify-self: center;
    }

    input[type="number"] {
      background-color: var(--background-color);
      color: var(--text-color);
      max-width: 45px;
    }

    input[type="checkbox"] {
      width: 16px;
      height: 16px;
      margin: 2px;
      cursor: pointer;
    }

    .led-row {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 5px;
    }

    .frame-label {
      width: 70px;
      text-align: right;
      margin-right: 10px;
    }

    select, ::picker(select) {
      appearance: base-select;
    }

    select {
      padding: 1px;
      margin: 2px;
      border-radius: 3px;
      background: var(--container-color);
      color: var(--text-color);
      font-size: 14px;
    }

    select > option {
      transition: 0.2s;
      background-color: var(--container-color);
      color: var(--text-color);
    }

    select > option:checked, select > option:hover {
      background-color: var(--background-color);
    }

    @media (max-width: 900px) {
      .flex-container {
        flex-direction: column;
      }
      
      .flex-container > div {
        width: 97%;
      }
    }
  </style>

  <script src="https://cdn.plot.ly/plotly-3.4.0.min.js" charset="utf-8"></script>
  <script>
    const dataUpdateDelay = 2000;

    const frameCap = 12;
    var framesShown = 1;
    var currentFrame = 0;
    var customState = [];
    var checkboxes = [];
    var frameDelay = 200;
    var boundariesShown = false;

    function setPattern(p) {
      fetch('/set_pattern/' + p);

      customBlock = document.getElementById("custom-pattern")
      if (p == 5) {
        customBlock.style.display = "block";
      } else {
        customBlock.style.display = "none";
      }

    }

    function setCustom(c, btn) {
      fetch('/set_custom/' + c)

      btn.classList.toggle("active");
    }

    function refreshData() {
      fetch('/data')
      .then(res => res.json())
      .then(data => {
        document.getElementById("temperature").innerText = data.temperature;
        document.getElementById("pattern").innerText = data.pattern;
        document.getElementById("temp-led-low").innerText = data.temp_led_low;
        document.getElementById("temp-led-med").innerText = data.temp_led_med;
        document.getElementById("temp-led-high").innerText = data.temp_led_high;
      });
    }

    function changePattern() {
      const patternSelector = document.getElementById('pattern-selector');
      const selectedValue = patternSelector.value;
      
      setPattern(selectedValue);
    }


    const layout = {
      plot_bgcolor: 'rgb(41, 38, 38)',
      paper_bgcolor: 'rgb(41, 38, 38)',
      font: {
        family: 'Segoe UI, Tahoma, Geneva, Verdana, sans-serif',
        size: 14,
        color: 'rgb(211, 197, 197)' 
      },
      title: {
        text: 'Temperature History'
      },
      xaxis: {
        title: {
          text: 'Time Since Reading (s)'
        }
      },
      yaxis: {
        title: {
          text: 'Temperature (°C)'
        }
      }
    }

    const config = {
      displayModeBar: false,
      responsive: true
    };

    function updateGraph() {
      const graphDiv = document.getElementById('temperature-graph');

      fetch('/set_graph')
        .then(res => res.json())
        .then(data => {
          Plotly.update(graphDiv, {
            x: [data.time_history],
            y: [data.temp_history]
        });
      });
    }

    // called to initialise the frame data buffer and relevant display info
    function populateFrameSelector() {
      const frameSelector = document.getElementById('frame-count');

      for (var i = 1; i <= frameCap; i++) {
        var frameOption = document.createElement("option");
        frameOption.value = i;
        frameOption.text = i;
        frameSelector.add(frameOption);
      }

      for (var i = 0; i < framesShown; i++) {
        customState.push([false, false, false, false, false, false]);
      }

      renderLedGrid();
    }

    // tracks updates to frame count through the 'frames shown' input
    // when an update happens, modifies relevant frame data to ensure that data length matches
    // checkbox page length
    function changeFrames() {
      const newFrames = parseInt(document.getElementById('frame-count').value);
      const lengthChange = newFrames - customState.length;
      
      if (lengthChange > 0) {
        for (var i = 0; i < lengthChange; i++) {
          customState.push([false, false, false, false, false, false]);
        }
      } else if (lengthChange < 0) {
        for (var i = 0; i < Math.abs(lengthChange); i++) {
          customState.pop();
        }
      }
      
      framesShown = newFrames;
      renderLedGrid(); 
    }

    // produces the led checkbox grid
    function renderLedGrid() {
      const grid = document.getElementById('led-grid');
      grid.innerHTML = '';

      for (let r = 0; r < framesShown; r++) {
        const rowDiv = document.createElement('div');
        rowDiv.className = 'led-row';

        const rowLabel = document.createElement('span');
        rowLabel.className = 'frame-label';
        rowLabel.innerText = 'Frame ' + (r + 1);
        rowDiv.appendChild(rowLabel);

        for (let c = 0; c < 6; c++) {
          const ledCheckbox = document.createElement('input');
          ledCheckbox.type = 'checkbox';
          ledCheckbox.checked = customState[r][c];

          ledCheckbox.addEventListener('change', (e) => {
            customState[r][c] = e.target.checked;
          });

          rowDiv.appendChild(ledCheckbox);
        }
        grid.appendChild(rowDiv);
      }
    }

    function changeDelay() {
      const newDelay = document.getElementById('custom-delay').value;
      frameDelay = parseInt(newDelay);
    }

    // sends a pattern to the flask 'set_custom' data endpoint
    function savePattern() {
      const data = {
        frames: customState,
        delay: frameDelay,
      };

      fetch('/set_custom', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(data)
      });
    }

    function setTempLeds() {
      const temp_low_value = document.getElementById("edit-low").value.toString()
      const temp_med_value = document.getElementById("edit-med").value.toString()
      const temp_high_value = document.getElementById("edit-high").value.toString()
      temp_values = temp_low_value + "," + temp_med_value + "," + temp_high_value

      tempEditBlock = document.getElementById("edit-temp-leds")
      toggleTempOption();

      fetch('/set-temp-leds/' + temp_values);
    }

    function toggleTempOption() {
      boundariesShown = !boundariesShown;
      tempEditBlock = document.getElementById("edit-temp-leds");
      if (boundariesShown) {
        tempEditBlock.style.display = "flex";
      } else {
        tempEditBlock.style.display = "none";
      }
    }

    setInterval(() => {
      refreshData();
      updateGraph();
    }, dataUpdateDelay);

    document.addEventListener("DOMContentLoaded", () => {
      populateFrameSelector();

      const graphDiv = document.getElementById('temperature-graph');

      Plotly.newPlot(graphDiv, [{
        x: [],
        y: [],
        mode: 'lines+markers',
        marker: { color: 'rgb(211, 197, 197)' },
        line: { color: 'rgb(211, 197, 197)' }
      }], layout, config);

    });
  </script>
</head>

<body>
<h1>IoT Assignment</h1>

<div class="flex-container">
  <div class="content-container" style="flex-basis: 60%;">
    <h2>Temperature</h2>
    <h3>Current Temperature</h3>
    <p><span id="temperature">N/A</span>&#8451</p>
    <div id="temperature-graph"></div>
    <div id="temp-leds">
      <h3>Temperature LED Boundaries</h3>
      <p>Low: <span id="temp-led-low">N/A</span>&#8451</p>
      <p>Medium: <span id="temp-led-med">N/A</span>&#8451</p>
      <p>High: <span id="temp-led-high">N/A</span>&#8451</p>
    </div>
    <button onclick="toggleTempOption()">Edit Boundaries</button>
    <div id="edit-temp-leds" class="secondary-container">
      <div><label>Low:</label><input type="number" id="edit-low" value="0"><span>℃</span></div>
      <div><label>Medium:</label><input type="number" id="edit-med" value="0"><span>℃</span></div>
      <div><label>High:</label><input type="number" id="edit-high" value="0"><span>℃</span></div>
      <button onclick="setTempLeds()">Apply</button>
    </div>
  </div>

  <div class="content-container" style="flex-basis: 40%;">
    <h2>LED Control</h2>
    <h3>Current Pattern</h3>
    <span id="pattern">N/A</span>
    <h3>Select Pattern</h3>
    <select id="pattern-selector" class="select-pattern" onchange="changePattern()">
      <option value="0" selected>None</option>
      <option value="1">Blink</option>
      <option value="2">Chase</option>
      <option value="3">Random</option>
      <option value="4">Rainbow</option>
      <option value="5">Custom</option>
    </select>
    <div id="custom-pattern" class="secondary-container">
      <h3 style="margin-top: 0;">Custom Pattern Options</h3>
      <div style="justify-self: center;"><span id="frame-number">Pattern Data</span></div>
      <div id="led-grid" class="led-checkboxes"></div>
      <div class="control-buttons">
        <div>
          <label>Pattern Stages:</label>
          <select id="frame-count" class="select-pattern" onchange="changeFrames()"></select>
        </div>
        <div>
          </label>Delay:</label>
          <select id="custom-delay" class="select-pattern" onchange="changeDelay()">
            <option value="500">50ms</option>
            <option value="100">100ms</option>
            <option value="200" selected>200ms</option>
            <option value="300">300ms</option>
            <option value="400">400ms</option>
          </select>
        </div>
      </div>
      <div class="control-buttons">
        <button onclick="savePattern()">Save</button>
      </div>
    </div>
  </div>

</div>
</body> 

</html>
